# version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cv_matcher_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  falkordb:
    image: falkordb/falkordb:latest
    container_name: cv_matcher_falkordb
    ports:
      - "6379:6379" # Default Redis/FalkorDB port
      - "3000:3000"  
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    restart: always

volumes:
  qdrant_data:
  falkordb_data:
